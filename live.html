<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hussein TV | Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .header {
            width: 100%;
            padding: 15px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .channel-name-top {
            font-size: 18px;
            font-weight: bold;
        }

        .player-container {
            width: 95%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            margin-top: 50px;
            border: 2px solid #ffc107; /* الإطار الذهبي كما في الصورة */
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-section {
            text-align: center;
            margin-top: 30px;
        }

        .info-section h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .back-btn {
            background-color: #ffc107;
            color: #000;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #e0a800;
            transform: scale(1.05);
        }

        .close-icon {
            color: #ffc107;
            text-decoration: none;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>


    <a href="index.html" class="close-icon">
        إغلاق <i class="fas fa-times"></i>
    </a>

    <div class="player-container">
        <iframe id="main-player" src="" allowfullscreen></iframe>
    </div>

    <div class="info-section">
        <h1 id="channel-title">جاري التحميل...</h1>
        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>

    <script>
        // دالة لجلب البيانات من الرابط (URL Parameters)
        function getParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const channelLink = getParam('link');
        const channelName = getParam('name');

        if (channelLink) {
            document.getElementById('main-player').src = channelLink;
        }
        
        if (channelName) {
            document.getElementById('channel-title').innerText = decodeURIComponent(channelName);
            document.title = "Hussein TV | " + decodeURIComponent(channelName);
        }
    </script>
</body>
</html>
