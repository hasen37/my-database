<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hussein TV | عالم الدراما</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-trigger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div class="main-logo">Hussein <span>TV</span></div>
        <div class="search-trigger" onclick="toggleSearch()"><i class="fas fa-search"></i></div>
    </header>

    <div id="search-bar-container" class="search-overlay">
        <input type="text" id="search-input" placeholder="ابحث عن مسلسلك..." oninput="handleSearch()">
        <div class="close-search" onclick="toggleSearch()">&times;</div>
    </div>

    <div id="sidebar" class="sidebar-menu">
        <div class="sidebar-header">
            <h3>Hussein TV</h3>
            <span onclick="toggleSidebar()">&times;</span>
        </div>
        <nav>
            <a href="#" onclick="showHome()"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="#" onclick="showSeriesList()"><i class="fas fa-film"></i> المسلسلات</a>
            <a href="https://t.me/your_channel"><i class="fab fa-telegram"></i> تلغرام</a>
        </nav>
    </div>

    <main id="screen-home" class="screen active">
        <div id="hero-display" class="hero-banner">
            <div class="hero-info">
                <h2 id="hero-title">تحميل...</h2>
                <button class="play-now-btn" id="hero-play-btn"><i class="fas fa-play"></i> شاهد الآن</button>
            </div>
        </div>
        <div id="rows-container"></div>
    </main>

    <div id="screen-series-list" class="screen">
        <h2 class="section-title">جميع المسلسلات</h2>
        <div id="series-grid-main" class="grid-layout"></div>
    </div>

    <div id="screen-episodes" class="screen">
        <div id="video-container" class="player-box">
            <div id="player-wrapper"></div>
            <div class="player-controls">
                <button onclick="closePlayer()" class="btn-close-v"><i class="fas fa-times"></i> إغلاق</button>
                <button class="btn-download-v"><i class="fas fa-download"></i> تحميل</button>
            </div>
        </div>

        <div id="servers-section" class="server-list" style="display:none;">
            <p>اختر السيرفر:</p>
            <div id="servers-list" class="server-btns"></div>
        </div>

        <div class="series-meta">
            <div class="meta-poster">
                <img id="series-poster-img" src="" alt="">
            </div>
            <div class="meta-details">
                <h1 id="current-series-name">...</h1>
                <div class="badges">
                    <span class="year" id="series-year-tag">2026</span>
                    <span class="quality">HD</span>
                </div>
                <div class="action-btns">
                    <button class="fav-btn"><i class="far fa-heart"></i></button>
                    <button class="share-btn"><i class="fas fa-share-alt"></i></button>
                </div>
            </div>
        </div>

        <div class="episodes-container">
            <h3 class="ep-label">الموسم الأول</h3>
            <div id="episodes-grid" class="ep-grid"></div>
        </div>

        <div class="suggestions">
            <h3 class="ep-label">قد يعجبك أيضاً</h3>
            <div id="suggested-row" class="suggestion-scroll"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-tab" onclick="window.open('https://t.me/your_channel')">
            <i class="fab fa-telegram"></i><span>تواصل</span>
        </div>
        <div class="nav-tab active" id="nav-home" onclick="showHome()">
            <i class="fas fa-home"></i><span>الرئيسية</span>
        </div>
        <div class="nav-tab" id="nav-series" onclick="showSeriesList()">
            <i class="fas fa-th-large"></i><span>المسلسلات</span>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
